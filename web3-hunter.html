<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web3 Hunter | Funmzy Tools</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#080808;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
  nav{background:#0f0f0f;border-bottom:1px solid #1a1a1a;padding:14px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  nav .logo{color:#F59E0B;font-weight:700;font-size:1rem;margin-right:10px;text-decoration:none}
  nav a{color:#888;font-size:0.78rem;text-decoration:none;padding:5px 10px;border-radius:6px;transition:.2s;border:1px solid #1a1a1a}
  nav a:hover,nav a.active{color:#F59E0B;border-color:#F59E0B;background:rgba(245,158,11,0.07)}
  .container{max-width:760px;margin:0 auto;padding:40px 20px}
  h1{font-size:1.7rem;font-weight:700;margin-bottom:6px}
  h1 span{color:#F59E0B}
  .subtitle{color:#666;font-size:0.9rem;margin-bottom:36px}
  .card{background:#0f0f0f;border:1px solid #1a1a1a;border-radius:14px;padding:28px;margin-bottom:24px}
  label{display:block;font-size:0.8rem;color:#F59E0B;font-weight:600;letter-spacing:.05em;margin-bottom:8px;text-transform:uppercase}
  select,input,textarea{width:100%;background:#080808;border:1px solid #1a1a1a;color:#fff;border-radius:8px;padding:12px 14px;font-size:0.95rem;outline:none;transition:.2s;font-family:inherit}
  select:focus,input:focus,textarea:focus{border-color:#F59E0B;box-shadow:0 0 0 2px rgba(245,158,11,0.12)}
  .chain-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:0}
  .chain-btn{background:#080808;border:2px solid #1a1a1a;color:#888;border-radius:10px;padding:16px 10px;text-align:center;cursor:pointer;transition:.2s;font-size:0.9rem;font-weight:600}
  .chain-btn:hover{border-color:#8B5CF6;color:#8B5CF6}
  .chain-btn.selected{border-color:#F59E0B;color:#F59E0B;background:rgba(245,158,11,0.07)}
  .chain-icon{font-size:1.6rem;display:block;margin-bottom:6px}
  .btn{display:inline-flex;align-items:center;gap:8px;background:#F59E0B;color:#080808;border:none;border-radius:8px;padding:13px 26px;font-weight:700;font-size:0.95rem;cursor:pointer;transition:.2s;width:100%;justify-content:center;margin-top:8px}
  .btn:hover{background:#d97706}
  .btn.purple{background:#8B5CF6;color:#fff}
  .btn.purple:hover{background:#7c3aed}
  .output-card{background:#080808;border:1px solid #1a1a1a;border-radius:10px;padding:20px;position:relative;margin-top:20px}
  .output-label{font-size:0.75rem;color:#F59E0B;font-weight:600;letter-spacing:.07em;text-transform:uppercase;margin-bottom:12px}
  .output-text{color:#e0e0e0;font-size:0.92rem;line-height:1.7;white-space:pre-wrap;font-family:'Segoe UI',sans-serif}
  .copy-btn{position:absolute;top:16px;right:16px;background:#1a1a1a;border:1px solid #333;color:#888;border-radius:6px;padding:6px 14px;font-size:0.78rem;cursor:pointer;transition:.2s;font-weight:600}
  .copy-btn:hover{background:#F59E0B;color:#080808;border-color:#F59E0B}
  .copy-btn.copied{background:#22c55e;color:#fff;border-color:#22c55e}
  .form-group{margin-bottom:20px}
  .tag{display:inline-block;background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.3);color:#8B5CF6;border-radius:5px;padding:3px 10px;font-size:0.75rem;font-weight:600;margin-bottom:14px}
  @media(max-width:600px){.chain-grid{grid-template-columns:1fr 1fr}.container{padding:20px 14px}h1{font-size:1.3rem}}
</style>
</head>
<body>
<nav>
  <a href="web3-hunter.html" class="logo">⚡ Funmzy Tools</a>
  <a href="web3-hunter.html" class="active">🔍 Web3 Hunter</a>
  <a href="dm-generator.html">💬 DM Gen</a>
  <a href="kols3-diagnostic.html">📊 KOLS3</a>
  <a href="content-generator.html">✍️ Content</a>
  <a href="proposal-generator.html">📄 Proposal</a>
</nav>
<div class="container">
  <h1>Web3 <span>Hunter</span></h1>
  <p class="subtitle">Generate your morning alpha hunt prompt in seconds.</p>

  <div class="card">
    <div class="tag">STEP 1 — SELECT CHAIN</div>
    <div class="chain-grid">
      <div class="chain-btn" onclick="selectChain('Solana','◎')">
        <span class="chain-icon">◎</span>Solana
      </div>
      <div class="chain-btn" onclick="selectChain('Base','🔵')">
        <span class="chain-icon">🔵</span>Base
      </div>
      <div class="chain-btn" onclick="selectChain('BSC','🟡')">
        <span class="chain-icon">🟡</span>BSC
      </div>
    </div>
  </div>

  <div class="card">
    <div class="tag">STEP 2 — CUSTOMIZE (OPTIONAL)</div>
    <div class="form-group">
      <label>Focus (e.g. memecoins, DeFi, NFTs, launchpads)</label>
      <input type="text" id="focus" placeholder="e.g. memecoins with real community traction">
    </div>
    <div class="form-group" style="margin-bottom:0">
      <label>Budget / Capital Context</label>
      <input type="text" id="budget" placeholder="e.g. small cap under $5M mcap">
    </div>
  </div>

  <button class="btn" onclick="generate()">⚡ Generate Morning Hunt Prompt</button>

  <div id="output" style="display:none">
    <div class="output-card">
      <div class="output-label">🔍 Morning Hunt Prompt</div>
      <button class="copy-btn" id="copyBtn" onclick="copyOutput()">Copy</button>
      <div class="output-text" id="outputText"></div>
    </div>
  </div>
</div>

<script>
let selectedChain = '';
let selectedIcon = '';

function selectChain(chain, icon) {
  selectedChain = chain;
  selectedIcon = icon;
  document.querySelectorAll('.chain-btn').forEach(b => b.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
}

function generate() {
  if (!selectedChain) {
    alert('Please select a chain first.');
    return;
  }
  const focus = document.getElementById('focus').value.trim() || 'high-potential gems with early traction';
  const budget = document.getElementById('budget').value.trim() || 'small to mid cap opportunities';

  const prompts = {
    Solana: `🌅 SOLANA MORNING HUNT — ${new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}

Chain: Solana (SOL) ${selectedIcon}
Focus: ${focus}
Scope: ${budget}

▸ Scan Birdeye / Dexscreener for top Solana gainers (last 4h)
▸ Filter: volume > $200K | liquidity > $50K | age < 48h
▸ Check Pump.fun trending — flag any with 1000+ holders & active dev
▸ Review @SolanaFloor & @solanafm for new project launches
▸ Search CT: "Solana" + "gem" + "just launched" (last 12h)
▸ Check Solana Discord servers for alpha drops
▸ Scan Jupiter new pools — look for LP depth vs volume ratio
▸ Flag any projects with KOL engagement + no VC backing

Hunt Criteria:
✓ Real community (not bots)
✓ Active dev wallet (check recent txns)
✓ Growing holder count (not flat/declining)
✓ Organic CT mentions (not paid shills)

Output: List top 3 finds with contract, mcap, volume, and one-line thesis.`,

    Base: `🌅 BASE MORNING HUNT — ${new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}

Chain: Base (Coinbase L2) ${selectedIcon}
Focus: ${focus}
Scope: ${budget}

▸ Scan Dexscreener Base trending (last 4h gainers)
▸ Filter: volume > $150K | liquidity > $30K | holders growing
▸ Check BaseScan for new contract deploys (last 24h)
▸ Search X/CT: "Base" + "gem" + "new" (last 12h)
▸ Review @base_ecosystem announcements for new integrations
▸ Check Aerodrome/Uniswap V3 Base for new pools with activity
▸ Look for Coinbase ecosystem plays (CB Wallet trending tokens)
▸ Monitor Base Discord alpha channels for early calls

Hunt Criteria:
✓ Coinbase ecosystem tie-in = bonus
✓ LP locked or burned
✓ Growing social presence (not ghost accounts)
✓ Simple, clear narrative (degens want fast thesis)

Output: List top 3 finds with contract, mcap, volume, and one-line thesis.`,

    BSC: `🌅 BSC MORNING HUNT — ${new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})}

Chain: BNB Smart Chain (BSC) ${selectedIcon}
Focus: ${focus}
Scope: ${budget}

▸ Scan PancakeSwap trending + Dexscreener BSC (last 4h)
▸ Filter: volume > $300K | liquidity > $75K | buy/sell ratio > 1.5
▸ Check BscScan for hot new contract deploys (last 24h)
▸ Search X/CT: "BSC" OR "BNB" + "gem" + "just launched" (12h)
▸ Review @BNBCHAIN & @PancakeSwap for ecosystem news
▸ Check Pinksale / DXSALE for upcoming BSC launches
▸ Flag projects with Binance Labs or BNB Grant narrative
▸ Monitor BSC alpha Telegram groups for early calls

Hunt Criteria:
✓ No honeypot (verify on honeypot.is)
✓ Taxes ≤ 5% buy/sell
✓ Dev not dumping (check wallet activity)
✓ Real community engagement (Telegram activity)

Output: List top 3 finds with contract, mcap, volume, and one-line thesis.`
  };

  document.getElementById('outputText').textContent = prompts[selectedChain];
  document.getElementById('output').style.display = 'block';
  document.getElementById('copyBtn').textContent = 'Copy';
  document.getElementById('copyBtn').classList.remove('copied');
  document.getElementById('output').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function copyOutput() {
  const text = document.getElementById('outputText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}
</script>
</body>
</html>
