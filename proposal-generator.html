<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposal Generator | Funmzy Tools</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#080808;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
  nav{background:#0f0f0f;border-bottom:1px solid #1a1a1a;padding:14px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  nav .logo{color:#F59E0B;font-weight:700;font-size:1rem;margin-right:10px;text-decoration:none}
  nav a{color:#888;font-size:0.78rem;text-decoration:none;padding:5px 10px;border-radius:6px;transition:.2s;border:1px solid #1a1a1a}
  nav a:hover,nav a.active{color:#F59E0B;border-color:#F59E0B;background:rgba(245,158,11,0.07)}
  .container{max-width:820px;margin:0 auto;padding:40px 20px}
  h1{font-size:1.7rem;font-weight:700;margin-bottom:6px}
  h1 span{color:#F59E0B}
  .subtitle{color:#666;font-size:0.9rem;margin-bottom:36px}
  .card{background:#0f0f0f;border:1px solid #1a1a1a;border-radius:14px;padding:28px;margin-bottom:24px}
  label{display:block;font-size:0.8rem;color:#F59E0B;font-weight:600;letter-spacing:.05em;margin-bottom:8px;text-transform:uppercase}
  select,input,textarea{width:100%;background:#080808;border:1px solid #1a1a1a;color:#fff;border-radius:8px;padding:12px 14px;font-size:0.95rem;outline:none;transition:.2s;font-family:inherit}
  select:focus,input:focus,textarea:focus{border-color:#F59E0B;box-shadow:0 0 0 2px rgba(245,158,11,0.12)}
  select option{background:#0f0f0f}
  textarea{resize:vertical;min-height:90px}
  .form-group{margin-bottom:18px}
  .form-group:last-child{margin-bottom:0}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .btn{display:inline-flex;align-items:center;gap:8px;background:#F59E0B;color:#080808;border:none;border-radius:8px;padding:13px 26px;font-weight:700;font-size:0.95rem;cursor:pointer;transition:.2s;justify-content:center}
  .btn:hover{background:#d97706}
  .btn.full{width:100%;margin-top:4px}
  .btn.purple{background:#8B5CF6;color:#fff}
  .btn.purple:hover{background:#7c3aed}
  .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
  .tag{display:inline-block;background:rgba(139,92,246,0.15);border:1px solid rgba(139,92,246,0.3);color:#8B5CF6;border-radius:5px;padding:3px 10px;font-size:0.75rem;font-weight:600;margin-bottom:16px}
  .preview-wrap{margin-top:28px}
  .preview-label{font-size:0.78rem;color:#F59E0B;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:14px}

  /* PDF PROPOSAL STYLES */
  #proposalDoc{background:#fff;color:#111;border-radius:14px;overflow:hidden;box-shadow:0 0 0 1px #1a1a1a}
  .prop-header{background:linear-gradient(135deg,#080808 0%,#111 60%,#1a0a00 100%);padding:44px 48px 36px;position:relative;overflow:hidden}
  .prop-header::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:rgba(245,158,11,0.08);pointer-events:none}
  .prop-header::after{content:'';position:absolute;bottom:-60px;right:60px;width:140px;height:140px;border-radius:50%;background:rgba(139,92,246,0.06);pointer-events:none}
  .prop-logo{font-size:2rem;font-weight:900;color:#F59E0B;letter-spacing:-.02em;margin-bottom:4px}
  .prop-tagline{color:#555;font-size:0.82rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:32px}
  .prop-title{color:#fff;font-size:1.5rem;font-weight:700;margin-bottom:6px}
  .prop-subtitle{color:#888;font-size:0.88rem}
  .prop-meta{display:flex;gap:28px;margin-top:24px;flex-wrap:wrap}
  .prop-meta-item{display:flex;flex-direction:column;gap:2px}
  .prop-meta-item .ml{font-size:0.72rem;color:#555;text-transform:uppercase;letter-spacing:.07em}
  .prop-meta-item .mv{font-size:0.88rem;color:#ccc;font-weight:600}
  .prop-body{padding:40px 48px}
  .prop-section{margin-bottom:36px}
  .prop-section-title{font-size:0.72rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#F59E0B;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .prop-section-title::after{content:'';flex:1;height:1px;background:#f0f0f0}
  .prop-intro{font-size:0.95rem;line-height:1.75;color:#333}
  .deliverables-list{list-style:none;display:flex;flex-direction:column;gap:10px}
  .deliverables-list li{display:flex;align-items:flex-start;gap:12px;font-size:0.92rem;color:#333;padding:12px 16px;background:#fafafa;border-radius:8px;border:1px solid #f0f0f0}
  .deliverables-list li::before{content:'✓';color:#F59E0B;font-weight:800;font-size:0.9rem;flex-shrink:0;margin-top:1px}
  .timeline-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
  .timeline-item{background:#fafafa;border:1px solid #f0f0f0;border-radius:8px;padding:14px;text-align:center}
  .tl-phase{font-size:0.7rem;color:#999;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
  .tl-name{font-size:0.85rem;font-weight:700;color:#111;margin-bottom:2px}
  .tl-dur{font-size:0.78rem;color:#F59E0B;font-weight:600}
  .price-box{background:linear-gradient(135deg,#080808,#111);border-radius:12px;padding:28px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
  .price-amount{font-size:2.2rem;font-weight:900;color:#F59E0B;letter-spacing:-.02em}
  .price-label{font-size:0.75rem;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
  .payment-terms{display:flex;flex-direction:column;gap:8px}
  .payment-term{display:flex;align-items:center;gap:10px;font-size:0.85rem;color:#ccc}
  .payment-term .dot{width:8px;height:8px;border-radius:50%;background:#8B5CF6;flex-shrink:0}
  .payment-term .dot.gold{background:#F59E0B}
  .prop-footer{background:#fafafa;border-top:1px solid #f0f0f0;padding:24px 48px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
  .footer-contact{font-size:0.85rem;color:#555}
  .footer-contact strong{color:#111}
  .footer-brand{font-size:0.78rem;color:#aaa;text-align:right}
  .validity-note{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:12px 16px;font-size:0.83rem;color:#92400e;margin-top:16px;display:flex;align-items:center;gap:8px}
  .validity-note::before{content:'⏳';font-size:1rem}

  @media print{
    body{background:#fff}
    nav,#inputSection,.preview-label,.btn-row{display:none!important}
    .preview-wrap{margin-top:0}
    #proposalDoc{box-shadow:none;border-radius:0}
    .prop-body{padding:32px 40px}
    .prop-header{padding:36px 40px 28px}
  }
  @media(max-width:600px){
    .form-row,.btn-row{grid-template-columns:1fr}
    .container{padding:20px 14px}
    h1{font-size:1.3rem}
    .prop-header,.prop-body{padding:28px 24px}
    .prop-footer{padding:20px 24px}
    .price-box{flex-direction:column;align-items:flex-start}
  }
</style>
</head>
<body>
<nav>
  <a href="web3-hunter.html" class="logo">⚡ Funmzy Tools</a>
  <a href="web3-hunter.html">🔍 Web3 Hunter</a>
  <a href="dm-generator.html">💬 DM Gen</a>
  <a href="kols3-diagnostic.html">📊 KOLS3</a>
  <a href="content-generator.html">✍️ Content</a>
  <a href="proposal-generator.html" class="active">📄 Proposal</a>
</nav>
<div class="container">
  <h1>Proposal <span>Generator</span></h1>
  <p class="subtitle">Fill in the details — get a professional PDF proposal instantly.</p>

  <div id="inputSection">
    <div class="card">
      <div class="tag">CLIENT & PROJECT</div>
      <div class="form-row">
        <div class="form-group">
          <label>Client Name / Project</label>
          <input type="text" id="clientName" placeholder="e.g. HyperMoon Protocol">
        </div>
        <div class="form-group">
          <label>Client Twitter / Contact</label>
          <input type="text" id="clientHandle" placeholder="e.g. @HyperMoonXYZ">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label>Brief Project Description</label>
        <textarea id="clientDesc" placeholder="e.g. A next-gen memecoin on Solana with AI-powered tokenomics and a strong community focus"></textarea>
      </div>
    </div>

    <div class="card">
      <div class="tag">SERVICE & DELIVERABLES</div>
      <div class="form-group">
        <label>Service / Package</label>
        <select id="service" onchange="updateDeliverables()">
          <option value="landing">Landing Page Design & Build</option>
          <option value="aivideo">AI Video Content Package</option>
          <option value="memecoin">Memecoin Marketing Campaign</option>
          <option value="growth">Full Growth Strategy Package</option>
          <option value="kol">KOL Campaign Management</option>
          <option value="social">Social Growth Campaign</option>
          <option value="content">Content & Social Lead</option>
          <option value="custom">Custom / Bespoke Package</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label>Deliverables (one per line)</label>
        <textarea id="deliverables" rows="7" placeholder="Auto-fills based on service..."></textarea>
      </div>
    </div>

    <div class="card">
      <div class="tag">TIMELINE & PRICING</div>
      <div class="form-row">
        <div class="form-group">
          <label>Total Timeline</label>
          <select id="timeline">
            <option value="3 days">3 Days (Rush)</option>
            <option value="1 week">1 Week</option>
            <option value="2 weeks">2 Weeks</option>
            <option value="3 weeks">3 Weeks</option>
            <option value="1 month">1 Month</option>
            <option value="6 weeks">6 Weeks</option>
            <option value="2 months">2 Months</option>
            <option value="3 months">3 Months</option>
          </select>
        </div>
        <div class="form-group">
          <label>Currency</label>
          <select id="currency">
            <option value="$">USD ($)</option>
            <option value="€">EUR (€)</option>
            <option value="£">GBP (£)</option>
            <option value="USDT ">USDT</option>
            <option value="SOL ">SOL</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Total Price</label>
          <input type="text" id="price" placeholder="e.g. 2,500">
        </div>
        <div class="form-group">
          <label>Proposal Valid For</label>
          <select id="validity">
            <option value="7 days">7 Days</option>
            <option value="14 days">14 Days</option>
            <option value="30 days">30 Days</option>
          </select>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label>Additional Notes (optional)</label>
        <textarea id="notes" rows="3" placeholder="e.g. Rush fee applies, revisions included, specific requirements..."></textarea>
      </div>
    </div>

    <button class="btn full" onclick="generateProposal()">📄 Generate Proposal</button>
  </div>

  <div class="preview-wrap" id="previewSection" style="display:none">
    <div class="preview-label">📄 PROPOSAL PREVIEW</div>
    <div class="btn-row">
      <button class="btn purple" onclick="downloadPDF()">⬇️ Download as PDF</button>
      <button class="btn" style="background:#1a1a1a;color:#fff;border:1px solid #333" onclick="editAgain()">✏️ Edit Proposal</button>
    </div>
    <div style="height:16px"></div>
    <div id="proposalDoc"></div>
    <div class="btn-row" style="margin-top:16px">
      <button class="btn purple" onclick="downloadPDF()">⬇️ Download as PDF</button>
      <button class="btn" style="background:#1a1a1a;color:#fff;border:1px solid #333" onclick="editAgain()">✏️ Edit Proposal</button>
    </div>
  </div>
</div>

<script>
const DEFAULT_DELIVERABLES = {
  landing: `Custom landing page design (dark/Web3 aesthetic)\nMobile-responsive layout\nAbove-the-fold hero section with CTA\nTokenomics / Features section\nRoadmap section\nSocial links & wallet connect integration\n2 rounds of revisions\nFinal delivery as hosted link or exportable files`,
  aivideo: `4x AI-generated short-form videos (30–60 sec)\nCustom AI voiceover & music\nBranded captions & animated text\nPlatform-optimised exports (TikTok, X, YouTube Shorts)\nRaw files delivered\n1 revision per video`,
  memecoin: `Meme content strategy & calendar\n20x custom meme graphics\nViral tweet templates (10x)\nKOL seeding outreach list (20+ accounts)\nTelegram community growth playbook\nCT engagement strategy\nWeekly performance report`,
  growth: `Full growth audit & strategy doc\nContent calendar (30 days)\nKOL outreach & management\nCommunity growth playbook\nSocial media templates (15x)\nAI video content (2x)\nLanding page optimisation\nWeekly performance reporting\nMonthly strategy call`,
  kol: `KOL research & shortlisting (20+ accounts)\nOutreach & negotiation management\nCampaign brief creation\nContent review & approval\nPosting coordination\nPerformance tracking report\nPost-campaign analysis`,
  social: `Social media audit\n30-day content calendar\nDaily post templates (30x)\nHashtag & engagement strategy\nCT growth tactics\nBio & profile optimisation\nWeekly analytics report`,
  content: `Content strategy document\n30-day editorial calendar\nLong-form thread templates (8x)\nShort-form post templates (20x)\nEngagement playbook\nProfile & pinned post optimisation\nBi-weekly performance review`,
  custom: `[Custom deliverable 1]\n[Custom deliverable 2]\n[Custom deliverable 3]\n[Custom deliverable 4]\n[Edit these to match your scope]`
};

function updateDeliverables() {
  const svc = document.getElementById('service').value;
  document.getElementById('deliverables').value = DEFAULT_DELIVERABLES[svc] || '';
}

window.onload = () => updateDeliverables();

const SERVICE_NAMES = {
  landing: 'Landing Page Design & Build',
  aivideo: 'AI Video Content Package',
  memecoin: 'Memecoin Marketing Campaign',
  growth: 'Full Growth Strategy Package',
  kol: 'KOL Campaign Management',
  social: 'Social Growth Campaign',
  content: 'Content & Social Lead',
  custom: 'Custom / Bespoke Package'
};

function getTimelinePhases(timeline, service) {
  const phases = {
    '3 days':  [{p:'Day 1', n:'Brief & Setup', d:'Day 1'}, {p:'Day 2', n:'Execution', d:'Day 2'}, {p:'Day 3', n:'Delivery', d:'Day 3'}],
    '1 week':  [{p:'Days 1–2', n:'Strategy & Brief', d:'2 days'}, {p:'Days 3–5', n:'Execution', d:'3 days'}, {p:'Days 6–7', n:'Review & Delivery', d:'2 days'}],
    '2 weeks': [{p:'Week 1', n:'Strategy & Planning', d:'5 days'}, {p:'Week 1–2', n:'Execution', d:'7 days'}, {p:'Week 2', n:'Review & Delivery', d:'3 days'}],
    '3 weeks': [{p:'Week 1', n:'Discovery & Strategy', d:'5 days'}, {p:'Weeks 1–2', n:'Core Execution', d:'10 days'}, {p:'Week 3', n:'Revisions & Launch', d:'5 days'}],
    '1 month': [{p:'Week 1', n:'Onboarding & Strategy', d:'7 days'}, {p:'Weeks 2–3', n:'Execution', d:'14 days'}, {p:'Week 4', n:'Revisions & Handover', d:'7 days'}],
    '6 weeks': [{p:'Weeks 1–2', n:'Strategy & Setup', d:'14 days'}, {p:'Weeks 3–5', n:'Execution', d:'21 days'}, {p:'Week 6', n:'Review & Launch', d:'7 days'}],
    '2 months': [{p:'Month 1', n:'Foundation & Build', d:'4 weeks'}, {p:'Month 1–2', n:'Execution & Iteration', d:'4 weeks'}, {p:'Month 2', n:'Optimisation & Handover', d:'2 weeks'}],
    '3 months': [{p:'Month 1', n:'Strategy & Foundation', d:'4 weeks'}, {p:'Month 2', n:'Execution & Growth', d:'4 weeks'}, {p:'Month 3', n:'Scale & Optimise', d:'4 weeks'}]
  };
  return phases[timeline] || [{p:'Phase 1', n:'Setup', d:'-'}, {p:'Phase 2', n:'Execution', d:'-'}, {p:'Phase 3', n:'Delivery', d:'-'}];
}

function generateProposal() {
  const clientName   = document.getElementById('clientName').value.trim() || 'Valued Client';
  const clientHandle = document.getElementById('clientHandle').value.trim() || '';
  const clientDesc   = document.getElementById('clientDesc').value.trim() || 'A Web3 project looking to accelerate growth.';
  const service      = document.getElementById('service').value;
  const serviceName  = SERVICE_NAMES[service];
  const delivRaw     = document.getElementById('deliverables').value.trim();
  const deliverables = delivRaw.split('\n').filter(l => l.trim());
  const timeline     = document.getElementById('timeline').value;
  const currency     = document.getElementById('currency').value;
  const price        = document.getElementById('price').value.trim() || '0';
  const validity     = document.getElementById('validity').value;
  const notes        = document.getElementById('notes').value.trim();
  const phases       = getTimelinePhases(timeline, service);
  const today        = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  const upfront      = calcHalf(price);
  const delivery     = calcHalf(price);

  const phaseHtml = phases.map(ph => `
    <div class="timeline-item">
      <div class="tl-phase">${ph.p}</div>
      <div class="tl-name">${ph.n}</div>
      <div class="tl-dur">${ph.d}</div>
    </div>`).join('');

  const delivHtml = deliverables.map(d => `<li>${d.replace(/^[•\-✓\*]\s*/,'')}</li>`).join('');

  const notesHtml = notes ? `
    <div class="prop-section">
      <div class="prop-section-title">Additional Notes</div>
      <p class="prop-intro">${notes}</p>
    </div>` : '';

  const html = `
  <div class="prop-header">
    <div class="prop-logo">FUNMZY</div>
    <div class="prop-tagline">Web3 Growth Strategist</div>
    <div class="prop-title">Service Proposal: ${serviceName}</div>
    <div class="prop-subtitle">Prepared for ${clientName}${clientHandle ? ' · ' + clientHandle : ''}</div>
    <div class="prop-meta">
      <div class="prop-meta-item"><span class="ml">Date</span><span class="mv">${today}</span></div>
      <div class="prop-meta-item"><span class="ml">Valid For</span><span class="mv">${validity}</span></div>
      <div class="prop-meta-item"><span class="ml">Timeline</span><span class="mv">${timeline}</span></div>
      <div class="prop-meta-item"><span class="ml">Investment</span><span class="mv">${currency}${price}</span></div>
    </div>
  </div>

  <div class="prop-body">

    <div class="prop-section">
      <div class="prop-section-title">Project Overview</div>
      <p class="prop-intro">
        Thank you for the opportunity to work with <strong>${clientName}</strong>. This proposal outlines how I'll help you achieve your growth goals through a focused, results-driven <strong>${serviceName}</strong>.<br><br>
        ${clientDesc}<br><br>
        My approach is built on three principles: <strong>clarity of execution, community alignment, and measurable outcomes</strong>. Everything in this proposal is designed to move the needle — not generate vanity metrics.
      </p>
    </div>

    <div class="prop-section">
      <div class="prop-section-title">Deliverables</div>
      <ul class="deliverables-list">${delivHtml}</ul>
    </div>

    <div class="prop-section">
      <div class="prop-section-title">Timeline — ${timeline}</div>
      <div class="timeline-grid">${phaseHtml}</div>
    </div>

    <div class="prop-section">
      <div class="prop-section-title">Investment & Payment Terms</div>
      <div class="price-box">
        <div>
          <div class="price-label">Total Investment</div>
          <div class="price-amount">${currency}${price}</div>
        </div>
        <div class="payment-terms">
          <div class="payment-term"><span class="dot gold"></span> <strong style="color:#F59E0B">50% upfront</strong>&nbsp;— ${currency}${upfront} to begin work</div>
          <div class="payment-term"><span class="dot"></span> <strong style="color:#8B5CF6">50% on delivery</strong>&nbsp;— ${currency}${delivery} on final handover</div>
        </div>
      </div>
      <div class="validity-note">This proposal is valid for <strong>${validity}</strong> from the date of issue (${today}). Pricing may be revised after this period.</div>
    </div>

    ${notesHtml}

    <div class="prop-section">
      <div class="prop-section-title">Why Work With Me</div>
      <p class="prop-intro">
        I'm Funmzy — a Web3 growth strategist who's worked with projects across Solana, Base, and BSC at various stages of growth. I don't just execute campaigns — I think about what actually moves projects forward: <strong>narrative, community, and execution that compounds</strong>.<br><br>
        I work with a small number of clients at any time to ensure every project gets focused attention. If you're reading this proposal, I already believe in what you're building.
      </p>
    </div>

  </div>

  <div class="prop-footer">
    <div class="footer-contact">
      Ready to move forward? Let's go.<br>
      <strong>Telegram:</strong> @Funmzydasilva &nbsp;|&nbsp; <strong>Twitter:</strong> @Lionrage10
    </div>
    <div class="footer-brand">
      FUNMZY · Web3 Growth<br>
      <span style="color:#F59E0B">funmzy.web3</span>
    </div>
  </div>`;

  document.getElementById('proposalDoc').innerHTML = html;
  document.getElementById('inputSection').style.display = 'none';
  document.getElementById('previewSection').style.display = 'block';
  document.getElementById('previewSection').scrollIntoView({behavior:'smooth',block:'start'});
}

function calcHalf(priceStr) {
  const num = parseFloat(priceStr.replace(/[^0-9.]/g,''));
  if(isNaN(num)) return priceStr;
  const half = (num / 2).toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 2});
  return half;
}

function downloadPDF() {
  const doc = document.getElementById('proposalDoc');
  const clientName = (document.getElementById('clientName') || {}).value || 'Client';

  // Use browser print as PDF
  const style = document.createElement('style');
  style.id = 'printStyle';
  style.textContent = `
    @media print {
      body > *:not(#printFrame) { display: none !important; }
    }
  `;

  const win = window.open('', '_blank', 'width=900,height=700');
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Funmzy Proposal — ${clientName}</title><style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#fff;color:#111}
    .prop-header{background:linear-gradient(135deg,#080808 0%,#111 60%,#1a0a00 100%);padding:44px 48px 36px}
    .prop-logo{font-size:2rem;font-weight:900;color:#F59E0B;letter-spacing:-.02em;margin-bottom:4px}
    .prop-tagline{color:#888;font-size:0.82rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:32px}
    .prop-title{color:#fff;font-size:1.5rem;font-weight:700;margin-bottom:6px}
    .prop-subtitle{color:#aaa;font-size:0.88rem}
    .prop-meta{display:flex;gap:28px;margin-top:24px;flex-wrap:wrap}
    .prop-meta-item{display:flex;flex-direction:column;gap:2px}
    .prop-meta-item .ml{font-size:0.72rem;color:#888;text-transform:uppercase;letter-spacing:.07em}
    .prop-meta-item .mv{font-size:0.88rem;color:#ccc;font-weight:600}
    .prop-body{padding:40px 48px}
    .prop-section{margin-bottom:36px}
